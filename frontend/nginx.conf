server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # ── Cabeceras de seguridad ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── SPA: React Router ──────────────────────────────────────
    # El ALB enruta /api/* al backend Target Group.
    # Nginx solo sirve los archivos estáticos del frontend.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check del ALB ───────────────────────────────────
    # El ALB llama a /health para saber si esta instancia está viva
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Información del Nodo Frontend ──────────────────────────
    # Sirve un JSON que será generado al vuelo por el entrypoint.sh
    location /frontend-info {
        default_type application/json;
        alias /usr/share/nginx/html/frontend-info.json;
    }

    # ── Caché de assets estáticos ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Compresión gzip ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype
        image/svg+xml;
}
